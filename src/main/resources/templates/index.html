<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Archivos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h1 class="text-center mb-4">📂 Gestor de Archivos</h1>

    <!-- Formulario de subida -->
    <form action="/upload" method="post" enctype="multipart/form-data" class="mb-4">
        <div class="input-group">
            <input type="file" name="file" class="form-control" required>
            <button class="btn btn-success">Subir</button>
        </div>
    </form>

    <!-- Listado de archivos -->
    <h2>Archivos disponibles</h2>
    <ul class="list-group mb-5">
        <li class="list-group-item bg-secondary text-white"
            th:each="file : ${files}">
            <span th:text="${file}"></span>
            <a th:href="@{'/delete/' + ${file}}"
               class="btn btn-danger btn-sm float-end">Eliminar</a>
        </li>
    </ul>

    <!-- Sección para buscar usuario en GitHub -->
    <div class="card bg-secondary text-white p-4">
        <h3 class="text-center mb-3">🔍 Buscar Usuario en GitHub</h3>
        <form method="get" action="#" 
              onsubmit="window.location='/github/' + document.getElementById('username').value; return false;">
            <div class="input-group">
                <input id="username" class="form-control" placeholder="Ingrese nombre de usuario" required>
                <button type="submit" class="btn btn-primary">Buscar</button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
