<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario de GitHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5 text-center">
    <h1 th:text="'👤 Usuario: ' + ${user.login}"></h1>
    <img th:src="${user.avatar_url}" class="rounded-circle my-3" width="150" alt="Avatar">
    <p th:text="'Nombre: ' + ${user.name}"></p>
    <p th:text="'Bio: ' + ${user.bio}"></p>
    <p th:text="'Repos públicos: ' + ${user.public_repos}"></p>
    <a href="/" class="btn btn-outline-light mt-3">⬅ Volver al inicio</a>
</div>

</body>
</html>
